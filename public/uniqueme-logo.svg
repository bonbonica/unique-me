    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.24" stop-color="#FFFDEE"/>
      <stop offset="0.48" stop-color="#FFEA57"/>
      <stop offset="0.74" stop-color="#F5A500"/>
      <stop offset="1" stop-color="#A35B00"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#4A2600" flood-opacity="0.35"/>
    </filter>
