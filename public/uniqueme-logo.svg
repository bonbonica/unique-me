<?xml version="1.0" encoding="UTF-8"?>
<svg width="540" height="540" viewBox="297 439 540 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gold letter U logo with sparkle">
  <defs>
    <linearGradient id="goldMain" x1="260" y1="520" x2="750" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2A300"/>
      <stop offset="0.22" stop-color="#FFD64A"/>
      <stop offset="0.48" stop-color="#F6A800"/>
      <stop offset="0.78" stop-color="#D98600"/>
      <stop offset="1" stop-color="#FFCA32"/>
    </linearGradient>

    <radialGradient id="shineLeft" cx="38%" cy="38%" r="48%">
      <stop offset="0" stop-color="#FFF9A8" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#FFE95C" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFD24A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="edgeGold" x1="220" y1="490" x2="780" y2="990" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF36B"/>
      <stop offset="0.22" stop-color="#F3A100"/>
      <stop offset="0.55" stop-color="#7B3D00"/>
      <stop offset="0.82" stop-color="#FFCE35"/>
